<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="ahBg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07090F"/>
      <stop offset="100%" stop-color="#0D1220"/>
    </linearGradient>
    <radialGradient id="ahGlow" cx="62%" cy="30%" r="48%">
      <stop offset="0%" stop-color="#FF9900" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ahGlow2" cx="25%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#FF9900" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="0"/>
    </radialGradient>
    <pattern id="ahDots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.9" fill="rgba(255,153,0,0.13)"/>
    </pattern>
    <clipPath id="ahMag">
      <circle cx="518" cy="205" r="108"/>
    </clipPath>
    <filter id="ahMagGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="800" height="500" fill="url(#ahBg)"/>
  <rect width="800" height="500" fill="url(#ahDots)"/>
  <rect width="800" height="500" fill="url(#ahGlow)"/>
  <rect width="800" height="500" fill="url(#ahGlow2)"/>

  <!-- ═══ LEFT: Stacked product boxes ═══ -->
  <!-- Box shadow / depth -->
  <rect x="82" y="222" width="148" height="148" rx="12" fill="rgba(255,153,0,0.04)" transform="translate(6,6)"/>
  <!-- Back-left box -->
  <rect x="68" y="195" width="115" height="115" rx="10" fill="#0C1828" stroke="#FF990030" stroke-width="1.5"/>
  <!-- Back-right box -->
  <rect x="108" y="165" width="115" height="115" rx="10" fill="#101F30" stroke="#FF990038" stroke-width="1.5"/>
  <!-- Front main box (brightest) -->
  <rect x="75" y="230" width="148" height="148" rx="12" fill="#0D1E34" stroke="#FF990070" stroke-width="2"/>

  <!-- Tape stripes on front box -->
  <rect x="147" y="230" width="5" height="148" fill="#FF9900" opacity="0.52" rx="2"/>
  <rect x="75" y="301" width="148" height="5" fill="#FF9900" opacity="0.52" rx="2"/>

  <!-- Amazon smile arrow on front box -->
  <path d="M96,354 Q150,378 205,356" fill="none" stroke="#FF9900" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <polygon points="203,349 211,360 199,362" fill="#FF9900" opacity="0.9"/>

  <!-- Small box top-right -->
  <rect x="185" y="172" width="72" height="72" rx="8" fill="#091626" stroke="#FF990048" stroke-width="1.5"/>
  <rect x="220" y="172" width="4" height="72" fill="#FF9900" opacity="0.42" rx="1"/>
  <path d="M196,230 Q222,241 248,231" fill="none" stroke="#FF9900" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <polygon points="246,225 252,234 241,236" fill="#FF9900" opacity="0.7"/>

  <!-- Floating small package top-left -->
  <rect x="52" y="155" width="48" height="48" rx="6" fill="#091422" stroke="#FF990030" stroke-width="1"/>
  <rect x="74" y="155" width="3" height="48" fill="#FF9900" opacity="0.35" rx="1"/>

  <!-- ═══ CENTER-RIGHT: Magnifying glass ═══ -->
  <!-- Glow halo behind -->
  <circle cx="518" cy="205" r="130" fill="rgba(255,153,0,0.06)"/>
  <circle cx="518" cy="205" r="118" fill="rgba(255,153,0,0.04)"/>

  <!-- Interior content (clipped) -->
  <g clip-path="url(#ahMag)">
    <rect x="410" y="97" width="216" height="216" fill="#07111A"/>

    <!-- Subtle grid inside -->
    <line x1="410" y1="145" x2="626" y2="145" stroke="#FF990015" stroke-width="1"/>
    <line x1="410" y1="175" x2="626" y2="175" stroke="#FF990012" stroke-width="1"/>
    <line x1="410" y1="205" x2="626" y2="205" stroke="#FF990012" stroke-width="1"/>
    <line x1="410" y1="235" x2="626" y2="235" stroke="#FF990012" stroke-width="1"/>
    <line x1="410" y1="265" x2="626" y2="265" stroke="#FF990015" stroke-width="1"/>
    <line x1="440" y1="97" x2="440" y2="313" stroke="#FF990008" stroke-width="1"/>
    <line x1="472" y1="97" x2="472" y2="313" stroke="#FF990008" stroke-width="1"/>
    <line x1="504" y1="97" x2="504" y2="313" stroke="#FF990008" stroke-width="1"/>
    <line x1="536" y1="97" x2="536" y2="313" stroke="#FF990008" stroke-width="1"/>
    <line x1="568" y1="97" x2="568" y2="313" stroke="#FF990008" stroke-width="1"/>
    <line x1="600" y1="97" x2="600" y2="313" stroke="#FF990008" stroke-width="1"/>

    <!-- Bar chart (rising products) -->
    <rect x="432" y="258" width="20" height="45" rx="3" fill="#FF990045"/>
    <rect x="460" y="240" width="20" height="63" rx="3" fill="#FF990058"/>
    <rect x="488" y="218" width="20" height="85" rx="3" fill="#FF990070"/>
    <rect x="516" y="196" width="20" height="107" rx="3" fill="#FF990088"/>
    <rect x="544" y="174" width="20" height="129" rx="3" fill="#FF9900A5"/>
    <rect x="572" y="152" width="20" height="151" rx="3" fill="#FF9900"/>

    <!-- Trend line over bars -->
    <polyline points="442,254 470,237 498,214 526,193 554,172 582,150"
      fill="none" stroke="#FFD700" stroke-width="3" stroke-linejoin="round" opacity="0.9"/>
    <!-- Glow on trend line -->
    <polyline points="442,254 470,237 498,214 526,193 554,172 582,150"
      fill="none" stroke="#FFD700" stroke-width="8" stroke-linejoin="round" opacity="0.18"/>
    <!-- End dot (highlighted) -->
    <circle cx="582" cy="150" r="6" fill="#FFD700" opacity="0.95"/>
    <circle cx="582" cy="150" r="12" fill="#FFD700" opacity="0.18"/>
  </g>

  <!-- Magnifier ring (front, over clipped content) -->
  <circle cx="518" cy="205" r="108" fill="none" stroke="#FF9900" stroke-width="5.5" stroke-opacity="0.88" filter="url(#ahMagGlow)"/>
  <circle cx="518" cy="205" r="102" fill="none" stroke="#FF9900" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Handle -->
  <line x1="601" y1="289" x2="674" y2="362" stroke="#FF9900" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
  <line x1="601" y1="289" x2="674" y2="362" stroke="#FFD700" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <circle cx="674" cy="362" r="10" fill="#FF9900" opacity="0.55"/>

  <!-- ═══ DECORATIVE DATA NODES ═══ -->
  <circle cx="318" cy="118" r="4.5" fill="#FF9900" opacity="0.55"/>
  <circle cx="342" cy="136" r="2.5" fill="#FFC300" opacity="0.4"/>
  <line x1="322" y1="121" x2="340" y2="134" stroke="#FF9900" stroke-width="1" stroke-opacity="0.3"/>

  <circle cx="704" cy="142" r="3.5" fill="#FFC300" opacity="0.45"/>
  <circle cx="718" cy="160" r="2" fill="#FF9900" opacity="0.3"/>
  <line x1="707" y1="145" x2="716" y2="158" stroke="#FF9900" stroke-width="1" stroke-opacity="0.25"/>

  <circle cx="716" cy="400" r="5" fill="#FF9900" opacity="0.35"/>
  <circle cx="696" cy="385" r="3" fill="#FFC300" opacity="0.25"/>

  <!-- Sparkle stars -->
  <g opacity="0.65">
    <line x1="338" y1="72" x2="338" y2="82" stroke="#FFC300" stroke-width="2" stroke-linecap="round"/>
    <line x1="333" y1="77" x2="343" y2="77" stroke="#FFC300" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g opacity="0.45">
    <line x1="698" y1="176" x2="698" y2="184" stroke="#FF9900" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="694" y1="180" x2="702" y2="180" stroke="#FF9900" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.38">
    <line x1="140" y1="130" x2="140" y2="138" stroke="#FFC300" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="136" y1="134" x2="144" y2="134" stroke="#FFC300" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="456" width="800" height="44" fill="rgba(0,0,0,0.4)"/>
  <text x="400" y="483" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,monospace" font-size="13" font-weight="700" fill="#FF9900" letter-spacing="5" opacity="0.9">AMAZON PRODUCT HUNTING</text>
  <rect x="244" y="490" width="312" height="1.5" fill="#FF9900" opacity="0.4" rx="1"/>
</svg>
