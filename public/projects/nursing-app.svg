<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="naBg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020B10"/>
      <stop offset="100%" stop-color="#041520"/>
    </linearGradient>
    <radialGradient id="naGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="naHeartGlow" cx="65%" cy="35%" r="32%">
      <stop offset="0%" stop-color="#F87171" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F87171" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="naShieldGlow" cx="22%" cy="55%" r="28%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="naDots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.8" fill="rgba(20,184,166,0.14)"/>
    </pattern>
    <filter id="naGlowF">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="naHeartF">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#naBg)"/>
  <rect width="800" height="500" fill="url(#naDots)"/>
  <rect width="800" height="500" fill="url(#naGlow)"/>
  <rect width="800" height="500" fill="url(#naHeartGlow)"/>
  <rect width="800" height="500" fill="url(#naShieldGlow)"/>

  <!-- ═══ LEFT: Medical shield ═══ -->
  <!-- Shield outer glow -->
  <path d="M128,130 L218,130 L252,155 L252,248 C252,308 170,355 170,355 C170,355 88,308 88,248 L88,155 Z"
    fill="rgba(20,184,166,0.06)" transform="scale(1.06) translate(-10,-8)"/>
  <!-- Shield body -->
  <path d="M128,130 L218,130 L252,155 L252,248 C252,308 170,355 170,355 C170,355 88,308 88,248 L88,155 Z"
    fill="#081C28" stroke="#14B8A660" stroke-width="2.5"/>
  <!-- Shield inner border -->
  <path d="M138,142 L210,142 L240,163 L240,246 C240,298 170,339 170,339 C170,339 100,298 100,246 L100,163 Z"
    fill="none" stroke="#14B8A625" stroke-width="1.5"/>

  <!-- Cross inside shield -->
  <rect x="154" y="178" width="32" height="96" rx="6" fill="#14B8A6" opacity="0.92" filter="url(#naGlowF)"/>
  <rect x="122" y="210" width="96" height="32" rx="6" fill="#14B8A6" opacity="0.92" filter="url(#naGlowF)"/>

  <!-- Stars / plus decorations -->
  <g opacity="0.55">
    <line x1="88" y1="105" x2="88" y2="115" stroke="#14B8A6" stroke-width="2" stroke-linecap="round"/>
    <line x1="83" y1="110" x2="93" y2="110" stroke="#14B8A6" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g opacity="0.35">
    <line x1="246" y1="118" x2="246" y2="126" stroke="#14B8A6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="242" y1="122" x2="250" y2="122" stroke="#14B8A6" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ═══ CENTER: Stethoscope ═══ -->
  <!-- Chest piece glow -->
  <circle cx="400" cy="348" r="65" fill="rgba(20,184,166,0.07)"/>

  <!-- Chest piece ring (outer) -->
  <circle cx="400" cy="348" r="54" fill="#091A24" stroke="#14B8A6" stroke-width="4.5" stroke-opacity="0.9" filter="url(#naGlowF)"/>
  <!-- Chest piece inner disc -->
  <circle cx="400" cy="348" r="34" fill="rgba(20,184,166,0.1)" stroke="#14B8A6" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Cross marks on chest piece -->
  <line x1="400" y1="320" x2="400" y2="376" stroke="#14B8A6" stroke-width="2" stroke-opacity="0.45"/>
  <line x1="372" y1="348" x2="428" y2="348" stroke="#14B8A6" stroke-width="2" stroke-opacity="0.45"/>

  <!-- Stethoscope tube arcs -->
  <!-- Left arc -->
  <path d="M370,300 C365,250 332,210 302,200 C272,190 260,205 260,228 C260,252 278,268 300,260"
    fill="none" stroke="#14B8A6" stroke-width="5.5" stroke-linecap="round" stroke-opacity="0.88"/>
  <!-- Right arc -->
  <path d="M430,300 C435,250 468,210 498,200 C528,190 540,205 540,228 C540,252 522,268 500,260"
    fill="none" stroke="#14B8A6" stroke-width="5.5" stroke-linecap="round" stroke-opacity="0.88"/>

  <!-- Earpiece nodes -->
  <circle cx="300" cy="260" r="12" fill="#14B8A6" opacity="0.88" filter="url(#naGlowF)"/>
  <circle cx="300" cy="260" r="6" fill="#14B8A6" opacity="0.5"/>
  <circle cx="500" cy="260" r="12" fill="#14B8A6" opacity="0.88" filter="url(#naGlowF)"/>
  <circle cx="500" cy="260" r="6" fill="#14B8A6" opacity="0.5"/>

  <!-- ═══ RIGHT: Animated heart ═══ -->
  <!-- Heart ambient glow -->
  <circle cx="622" cy="205" r="80" fill="rgba(248,113,113,0.08)"/>

  <!-- Heart shape -->
  <path d="M622,250 C622,250 554,208 554,163 C554,134 574,117 598,122 C610,126 619,134 622,143 C625,134 634,126 646,122 C670,117 690,134 690,163 C690,208 622,250 622,250Z"
    fill="#F87171" opacity="0.86" filter="url(#naHeartF)"/>
  <!-- Heart highlights -->
  <path d="M598,138 C594,130 586,126 578,131 C570,136 570,148 578,154 C584,158 592,157 596,152"
    fill="white" opacity="0.22"/>

  <!-- Dot nodes -->
  <circle cx="700" cy="145" r="4" fill="#F87171" opacity="0.45"/>
  <circle cx="716" cy="162" r="2.5" fill="#F87171" opacity="0.3"/>
  <line x1="704" y1="148" x2="714" y2="160" stroke="#F87171" stroke-width="1" stroke-opacity="0.25"/>

  <!-- ═══ ECG / HEARTBEAT LINE ═══ -->
  <!-- Glow pass -->
  <polyline
    points="68,398 110,398 128,398 144,352 160,442 174,398 196,398 220,398 236,352 252,442 266,398 286,398 302,398 318,352 334,442 348,398 368,398 384,398 400,352 416,442 430,398 450,398 466,398 482,352 498,442 514,398 532,398"
    fill="none" stroke="#14B8A6" stroke-width="7" stroke-opacity="0.15"
    stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Crisp line -->
  <polyline
    points="68,398 110,398 128,398 144,352 160,442 174,398 196,398 220,398 236,352 252,442 266,398 286,398 302,398 318,352 334,442 348,398 368,398 384,398 400,352 416,442 430,398 450,398 466,398 482,352 498,442 514,398 532,398"
    fill="none" stroke="#14B8A6" stroke-width="2.5" stroke-opacity="0.8"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Fading tail right -->
  <polyline
    points="532,398 560,398 578,398"
    fill="none" stroke="#14B8A6" stroke-width="2" stroke-opacity="0.3"
    stroke-linecap="round"/>

  <!-- Live dot at ECG head -->
  <circle cx="532" cy="398" r="5" fill="#14B8A6" opacity="0.9"/>
  <circle cx="532" cy="398" r="10" fill="#14B8A6" opacity="0.2"/>

  <!-- ═══ FLOATING DECORATIVE ELEMENTS ═══ -->
  <!-- Data nodes left -->
  <circle cx="50" cy="310" r="4" fill="#14B8A6" opacity="0.4"/>
  <circle cx="62" cy="295" r="2.5" fill="#14B8A6" opacity="0.28"/>
  <line x1="54" y1="307" x2="60" y2="297" stroke="#14B8A6" stroke-width="1" stroke-opacity="0.22"/>

  <!-- Top right nodes -->
  <circle cx="720" cy="292" r="3.5" fill="#14B8A6" opacity="0.38"/>
  <circle cx="736" cy="310" r="2" fill="#F87171" opacity="0.3"/>

  <!-- Plus signs floating -->
  <text x="56" y="165" font-size="20" fill="#14B8A6" opacity="0.28" font-family="sans-serif" font-weight="900">+</text>
  <text x="712" y="390" font-size="18" fill="#F87171" opacity="0.22" font-family="sans-serif" font-weight="900">+</text>
  <text x="562" y="145" font-size="15" fill="#14B8A6" opacity="0.22" font-family="sans-serif" font-weight="900">+</text>

  <!-- Sparkle top-center -->
  <g opacity="0.5">
    <line x1="400" y1="55" x2="400" y2="67" stroke="#14B8A6" stroke-width="2" stroke-linecap="round"/>
    <line x1="394" y1="61" x2="406" y2="61" stroke="#14B8A6" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="456" width="800" height="44" fill="rgba(0,0,0,0.42)"/>
  <text x="400" y="483" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,monospace" font-size="13" font-weight="700" fill="#14B8A6" letter-spacing="8" opacity="0.9">NURSING APP</text>
  <rect x="308" y="490" width="184" height="1.5" fill="#14B8A6" opacity="0.4" rx="1"/>
</svg>
